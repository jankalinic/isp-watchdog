<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>netwatch</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark border-bottom border-secondary mb-4">
  <div class="container">
    <span class="navbar-brand mb-0 h1"><i class="bi bi-activity"></i> netwatch</span>
  </div>
</nav>

<div class="container">

  <div class="card bg-body-tertiary mb-4">
    <div class="card-body text-center">
      <div class="d-flex justify-content-center gap-4 mb-3 stat-row">
        <div><i class="bi bi-lightning-charge-fill text-warning"></i> <span id="stat-ping">&mdash;</span> <small class="text-secondary">ms</small></div>
        <div><i class="bi bi-arrow-down-circle-fill text-info"></i> <span id="stat-download">&mdash;</span> <small class="text-secondary">Mbps</small></div>
        <div><i class="bi bi-arrow-up-circle-fill text-success"></i> <span id="stat-upload">&mdash;</span> <small class="text-secondary">Mbps</small></div>
      </div>

      <canvas id="gauge" width="300" height="200"></canvas>
      <div class="display-4" id="gauge-value">0.00</div>
      <div class="text-secondary mb-3">Mbps</div>

      <div id="check-status" class="text-secondary mb-3">Click "Check now" to test your connection</div>

      <button id="check-now" class="btn btn-primary btn-lg">
        <i class="bi bi-play-fill"></i> Check now
      </button>
    </div>
  </div>

  <h2 class="h4 mb-3">History</h2>
  <div class="row g-4 mb-4">
    <div class="col-lg-6">
      <div class="card bg-body-tertiary h-100">
        <div class="card-body">
          <img id="chart-latency" class="chart-img" src="/charts/latency.png" alt="Latency over time">
        </div>
      </div>
    </div>
    <div class="col-lg-6">
      <div class="card bg-body-tertiary h-100">
        <div class="card-body">
          <img id="chart-loss" class="chart-img" src="/charts/loss.png" alt="Packet loss over time">
        </div>
      </div>
    </div>
    <div class="col-lg-6">
      <div class="card bg-body-tertiary h-100">
        <div class="card-body">
          <img id="chart-speed" class="chart-img" src="/charts/speed.png" alt="Speed test results over time">
        </div>
      </div>
    </div>
    {% for target in targets %}
    <div class="col-lg-6">
      <div class="card bg-body-tertiary h-100">
        <div class="card-body">
          <img class="chart-img chart-traceroute" data-target="{{ target }}"
               src="/charts/traceroute_{{ target.replace('.', '_') }}.png"
               alt="Traceroute to {{ target }}">
        </div>
      </div>
    </div>
    {% endfor %}
  </div>

</div>

<div id="test-progress-track">
  <div id="test-progress-bar"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gaugeJS@1.3.7/dist/gauge.min.js"></script>
<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
